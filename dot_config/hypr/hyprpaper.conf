$rainworld-moon = /home/$USER/.config/hypr/assets/rainworld-moon.jpg
$rainworld-bells = /home/$USER/.config/hypr/assets/rainworld-bells.jpg

wallpaper {
    monitor = DP-1
    path = $rainworld-moon
    fit_mode = cover
}

wallpaper {
    monitor = HDMI-A-1
    path = $rainworld-bells
    fit_mode = cover
}
